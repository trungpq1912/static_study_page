<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2540">
  <title>Study Portal</title>
  <link rel="stylesheet" href="./css/index.css" />
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="logo">
        Study Portal
      </div>

      <nav class="menu">

        <!-- Study Japanese -->
        <div class="menu-group">

          <button
            class="menu-toggle"
            onclick="toggleJapaneseMenu()"
          >
            <span>Study Japanese</span>

            <span
              class="toggle-icon"
              id="jpToggleIcon"
            >
              −
            </span>
          </button>

          <div
            class="submenu"
            id="jpSubmenu"
          >

            <a
              href="./JP_Study/jp_grammar_v1.html"
              class="active"
            >
              Grammar
            </a>

            <a
              href="./JP_Study/jp_kotoba_v1.html"
            >
              Kotoba
            </a>

            <a
              href="./JP_Study/jp_test_v1.html"
            >
              Test
            </a>

          </div>

        </div>

        <!-- Other -->
        <a href="#" class="menu-link">
          Health
        </a>

        <a href="#" class="menu-link">
          Python
        </a>
      </nav>

    </aside>

    <!-- Main content -->
    <main class="content">

      <div class="welcome-card">

        <h1>Welcome</h1>

        <p>
          Personal learning portal for Japanese study,
          health knowledge, and Python development.
        </p>

      </div>

    </main>

  </div>

  <script>

    function toggleJapaneseMenu(){

      const submenu = document.getElementById("jpSubmenu");
      const icon = document.getElementById("jpToggleIcon");

      if(submenu.style.display === "none"){
        submenu.style.display = "block";
        icon.textContent = "−";
      }else{
        submenu.style.display = "none";
        icon.textContent = "+";
      }
    }

  </script>

</body>
</html>
